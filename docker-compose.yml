version: "3.9"

networks:
  subly-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: subly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-subly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-subly}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - subly-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: subly-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-subly}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    ports:
      - "5672:5672"    # AMQP
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - subly-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Gateway ───────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: subly-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth:3001"
      LISTINGS_SERVICE_URL: "http://listings:3002"
      MATCHING_SERVICE_URL: "http://matching:3003"
      ENV: ${ENV:-development}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    depends_on:
      - auth
      - listings
      - matching
    networks:
      - subly-net

  # ─── Auth Service (Node.js + Clerk) ────────────────────────────────────────

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: subly-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS}@rabbitmq:5672"
      NODE_ENV: ${ENV:-development}
      INVITE_SECRET: ${INVITE_SECRET:?INVITE_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET is required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Subly <invites@subly.app>}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Listings Service (Go + PostgreSQL) ────────────────────────────────────

  listings:
    build:
      context: ./services/listings
      dockerfile: Dockerfile
    container_name: subly-listings
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS}@rabbitmq:5672"
      AUTH_SERVICE_URL: "http://auth:3001"
      ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Matching Service (Python + FastAPI + Pinecone) ────────────────────────

  matching:
    build:
      context: ./services/matching
      dockerfile: Dockerfile
    container_name: subly-matching
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS}@rabbitmq:5672"
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: ${PINECONE_INDEX:-subly-listings}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENV: ${ENV:-development}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Trust Service (Python - scam detection worker) ───────────────────────

  trust:
    build:
      context: ./services/trust
      dockerfile: Dockerfile
    container_name: subly-trust
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      PORT: "3004"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS}@rabbitmq:5672"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Web (Next.js) ─────────────────────────────────────────────────────────

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    container_name: subly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
      GATEWAY_URL: "http://gateway:8080"
      NODE_ENV: ${ENV:-development}
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET is required}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-development}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    depends_on:
      - gateway
    networks:
      - subly-net
