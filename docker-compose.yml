version: "3.9"

networks:
  subly-net:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: subly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-subly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-subly_secret}
      POSTGRES_DB: ${POSTGRES_DB:-subly}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - subly-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: subly-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-subly}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-subly_secret}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - subly-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Gateway ───────────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: subly-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth:3001"
      LISTINGS_SERVICE_URL: "http://listings:3002"
      MATCHING_SERVICE_URL: "http://matching:3003"
      ENV: ${ENV:-development}
    depends_on:
      - auth
      - listings
      - matching
    networks:
      - subly-net

  # ─── Auth Service (Node.js + Clerk) ────────────────────────────────────────

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: subly-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD:-subly_secret}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS:-subly_secret}@rabbitmq:5672"
      NODE_ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Listings Service (Go + PostgreSQL) ────────────────────────────────────

  listings:
    build:
      context: ./services/listings
      dockerfile: Dockerfile
    container_name: subly-listings
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD:-subly_secret}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS:-subly_secret}@rabbitmq:5672"
      AUTH_SERVICE_URL: "http://auth:3001"
      ENV: ${ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Matching Service (Python + FastAPI + Pinecone) ────────────────────────

  matching:
    build:
      context: ./services/matching
      dockerfile: Dockerfile
    container_name: subly-matching
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-subly}:${POSTGRES_PASSWORD:-subly_secret}@postgres:5432/${POSTGRES_DB:-subly}"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-subly}:${RABBITMQ_PASS:-subly_secret}@rabbitmq:5672"
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: ${PINECONE_INDEX:-subly-listings}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENV: ${ENV:-development}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - subly-net

  # ─── Web (Next.js) ─────────────────────────────────────────────────────────

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: subly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
      NODE_ENV: ${ENV:-development}
    depends_on:
      - gateway
    networks:
      - subly-net
